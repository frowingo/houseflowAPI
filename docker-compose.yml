services:
  # HouseFlow API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: houseflow-api
    ports:
      - "3162:3162"
    environment:
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DB=houseflowDb
    depends_on:
      - mongodb
    networks:
      - houseflow-network
    volumes:
      - ./internal/config/config.json:/root/internal/config/config.json

  # MongoDB
  mongodb:
    image: mongo:latest
    container_name: houseflow-mongodb
    environment:
      MONGO_INITDB_DATABASE: houseflowDb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - houseflow-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Mongo Express (MongoDB yönetim paneli)
  mongo-express:
    image: mongo-express:latest
    container_name: houseflow-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
    depends_on:
      - mongodb
    networks:
      - houseflow-network

volumes:
  mongodb-data:

networks:
  houseflow-network:
    driver: bridge
