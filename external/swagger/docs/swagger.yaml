basePath: /api/v1
definitions:
  dtos.CreateHouseModel:
    properties:
      maxMemberCount:
        maximum: 8
        minimum: 1
        type: integer
      name:
        maxLength: 100
        minLength: 3
        type: string
      ownerId:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/entities.HouseType'
        enum:
        - StudentHouse
        - SharedHouse
        - DormRoom
    required:
    - maxMemberCount
    - name
    - ownerId
    - type
    type: object
  dtos.HouseResponseModel:
    properties:
      createdOn:
        type: string
      id:
        type: string
      inviteCode:
        type: string
      maxMemberCount:
        type: integer
      memberIds:
        items:
          type: string
        type: array
      name:
        type: string
      ownerId:
        type: string
      type:
        $ref: '#/definitions/entities.HouseType'
      updatedOn:
        type: string
    type: object
  dtos.JoinHouseByCodeModel:
    properties:
      inviteCode:
        type: string
      userId:
        type: string
    required:
    - inviteCode
    - userId
    type: object
  dtos.NewUserModel:
    properties:
      age:
        maximum: 150
        minimum: 0
        type: integer
      email:
        type: string
      firstName:
        maxLength: 50
        minLength: 2
        type: string
      lastName:
        maxLength: 50
        minLength: 2
        type: string
      password:
        minLength: 6
        type: string
      phoneNumber:
        maxLength: 15
        minLength: 10
        type: string
    required:
    - email
    - firstName
    - lastName
    - password
    type: object
  dtos.SignUpUserModel:
    properties:
      email:
        type: string
      firstName:
        maxLength: 50
        minLength: 2
        type: string
      lastName:
        maxLength: 50
        minLength: 2
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - firstName
    - lastName
    - password
    type: object
  entities.HouseType:
    enum:
    - StudentHouse
    - SharedHouse
    - DormRoom
    type: string
    x-enum-varnames:
    - StudentHouse
    - SharedHouse
    - DormRoom
  entities.User:
    properties:
      age:
        type: integer
      created_on:
        type: string
      email:
        type: string
      firstName:
        type: string
      house_ids:
        items:
          type: string
        type: array
      id:
        type: string
      image_url:
        type: string
      is_active:
        type: boolean
      last_login:
        type: string
      lastName:
        type: string
      password:
        type: string
      phoneNumber:
        type: string
      updated_on:
        type: string
    type: object
host: localhost:3162
info:
  contact:
    email: support@houseflow.com
    name: API Support
  description: HouseFlow API Documentation
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: HouseFlow API
  version: "1.0"
paths:
  /auth/login/{email}/{password}:
    get:
      consumes:
      - application/json
      description: Login with email and password to receive JWT token
      parameters:
      - description: User email address
        in: path
        name: email
        required: true
        type: string
      - description: User password
        in: path
        name: password
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Returns JWT token
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Invalid credentials
          schema:
            additionalProperties: true
            type: object
      summary: User Login
      tags:
      - Auth
  /auth/signup:
    post:
      consumes:
      - application/json
      description: Signup with email, password, firstname, and lastname to receive JWT token
      parameters:
      - description: Signup request
        in: body
        name: signup
        required: true
        schema:
          $ref: '#/definitions/dtos.SignUpUserModel'
      produces:
      - application/json
      responses:
        "201":
          description: Returns JWT token
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Invalid credentials
          schema:
            additionalProperties: true
            type: object
      summary: User Signup
      tags:
      - Auth
  /base/health:
    get:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      tags:
      - Base
  /house/create:
    post:
      consumes:
      - application/json
      parameters:
      - description: House object
        in: body
        name: house
        required: true
        schema:
          $ref: '#/definitions/dtos.CreateHouseModel'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.HouseResponseModel'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create new house
      tags:
      - House
  /house/join:
    post:
      consumes:
      - application/json
      parameters:
      - description: Join request
        in: body
        name: joinRequest
        required: true
        schema:
          $ref: '#/definitions/dtos.JoinHouseByCodeModel'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.HouseResponseModel'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Join house by invite code
      tags:
      - House
  /user:
    post:
      consumes:
      - application/json
      description: Create a new user in the system
      parameters:
      - description: User object
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/dtos.NewUserModel'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dtos.NewUserModel'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create new user
      tags:
      - User
  /user/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a user by their ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete a user
      tags:
      - User
  /user/getByEmail:
    get:
      consumes:
      - application/json
      description: Retrieve a user by their email address
      parameters:
      - description: User email
        in: query
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entities.User'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get user by email
      tags:
      - User
  /user/usersList:
    get:
      consumes:
      - application/json
      description: Get a list of all users in the system
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dtos.NewUserModel'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List all users
      tags:
      - User
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
